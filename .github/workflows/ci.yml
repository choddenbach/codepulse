name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build CLI bundle
        run: bun run build

      - name: Generate JSON and HTML reports
        run: |
          mkdir -p reports
          bun ./bin/codepulse scan --format json --output reports/codepulse-report.json --min-score 65 --fail-on none .
          bun ./bin/codepulse scan --format html --output reports/codepulse-report.html --min-score 65 --fail-on none .

      - name: Upload CodePulse artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codepulse-reports
          path: reports/
